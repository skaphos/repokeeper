version: "3"

vars:
  TASK_RUNNER: go -C tools tool task -d ..
  GINKGO_RUNNER: go run github.com/onsi/ginkgo/v2/ginkgo@v2.28.1
  GOLANGCI_RUNNER: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
  GOIMPORTS_RUNNER: go run golang.org/x/tools/cmd/goimports@v0.43.0
  STATICCHECK_RUNNER: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0
  GOVULNCHECK_RUNNER: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4
  SVU_RUNNER: go run github.com/caarlos0/svu/v3@v3.4.0

tasks:
  default:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  list:
    desc: List available tasks
    cmds:
      - '{{.TASK_RUNNER}} --list'

  all:
    desc: Build the local binary
    deps:
      - build

  build:
    desc: Build the repokeeper binary for the local OS/ARCH
    cmds:
      - go build -o repokeeper .

  notices:
    desc: Regenerate third-party notice inventories and license texts
    cmds:
      - '{{if eq OS "windows"}}powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/generate-notices.ps1{{else}}./scripts/generate-notices.sh{{end}}'

  install:
    desc: Install repokeeper binary to $GOPATH/bin
    cmds:
      - go install .

  uninstall:
    desc: Uninstall repokeeper binary from $GOPATH/bin
    cmds:
      - go clean -i github.com/skaphos/repokeeper

  build-ci:
    desc: Build all configured platform binaries (CI-style snapshot build)
    cmds:
      - '{{if eq OS "windows"}}powershell -NoProfile -Command "if (-not (Get-Command goreleaser -ErrorAction SilentlyContinue)) { Write-Error ''goreleaser not found in PATH; install the version declared in .tool-versions''; exit 1 }; goreleaser build --snapshot --clean"{{else}}command -v goreleaser >/dev/null 2>&1 || { echo "goreleaser not found in PATH; install the version declared in .tool-versions" >&2; exit 1; }; goreleaser build --snapshot --clean{{end}}'

  test:
    desc: Run test suite
    cmds:
      - '{{.GINKGO_RUNNER}} ./...'

  test-cover:
    desc: Run tests with coverage output (excludes scripts/perf)
    cmds:
      - '{{if eq OS "windows"}}powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/test-cover.ps1 coverage.out{{else}}go test -coverprofile=coverage.out $(go list ./... | grep -v scripts/perf){{end}}'

  test-cover-check:
    desc: Run tests with coverage and enforce per-package thresholds
    cmds:
      - go test -coverprofile=coverage.out ./...
      - '{{if eq OS "windows"}}powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/check-coverage.ps1 coverage.out{{else}}./scripts/check-coverage.sh coverage.out{{end}}'

  coverage-report:
    desc: Run coverage and print low-coverage packages/functions
    cmds:
      - go test -coverprofile=coverage.out ./...
      - '{{if eq OS "windows"}}powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/coverage-report.ps1 coverage.out{{else}}./scripts/coverage-report.sh coverage.out{{end}}'

  test-integration:
    desc: Run integration-tagged tests
    cmds:
      - go test -v -tags integration ./...

  lint:
    desc: Run linters
    cmds:
      - '{{.GOLANGCI_RUNNER}} run ./...'

  fmt:
    desc: Format code
    cmds:
      - '{{.GOIMPORTS_RUNNER}} -w .'
      - go fmt ./...

  staticcheck:
    desc: Run staticcheck directly
    cmds:
      - '{{.STATICCHECK_RUNNER}} ./...'

  vuln:
    desc: Run vulnerability scan
    cmds:
      - '{{.GOVULNCHECK_RUNNER}} ./...'

  perf-bench-quick:
    desc: Run a single lightweight benchmark pass for PR baseline checks (fast, count=1)
    cmds:
      - go run ./scripts/perf -history perf/history.jsonl -raw-dir perf/runs -packages ./internal/engine -bench . -benchtime 1x -count 1

  perf-bench:
    desc: Run benchmarks and append a timestamped history record (count=5, used on main and at release)
    cmds:
      - go run ./scripts/perf -history perf/history.jsonl -raw-dir perf/runs -packages ./internal/engine -bench . -benchtime 1x -count 5

  version-next:
    desc: Show next semantic version from git history (svu)
    cmds:
      - '{{.SVU_RUNNER}} next'

  clean:
    desc: Remove build artifacts and clear Go build outputs
    cmds:
      - go clean ./...
      - go clean -testcache
      - '{{if eq OS "windows"}}powershell -NoProfile -Command "Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue; Remove-Item -Force repokeeper.exe,repokeeper,coverage.out -ErrorAction SilentlyContinue"{{else}}rm -rf dist repokeeper coverage.out{{end}}'

  ci:
    desc: Run standard CI workflow locally
    deps:
      - lint
      - test
      - test-integration
      - staticcheck
      - vuln
      - build-ci
