version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - misspell
    - depguard
  settings:
    depguard:
      rules:
        engine-no-gitx:
          list-mode: lax
          files:
            - "**/internal/engine/**"
          deny:
            - pkg: "github.com/skaphos/repokeeper/internal/gitx"
              desc: "engine must use vcs.ErrorClassifier/URLNormalizer interfaces, not gitx directly"
        cmd-no-gitx:
          list-mode: lax
          files:
            - "**/cmd/repokeeper/**"
          deny:
            - pkg: "github.com/skaphos/repokeeper/internal/gitx"
              desc: "cmd must use vcs.ErrorClassifier interface, not gitx directly"

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
