version: 2

project_name: repokeeper

builds:
  - id: repokeeper
    main: .
    binary: repokeeper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/skaphos/repokeeper/cmd/repokeeper.Version={{.Version}}
      - -X github.com/skaphos/repokeeper/cmd/repokeeper.Commit={{.Commit}}
      - -X github.com/skaphos/repokeeper/cmd/repokeeper.Date={{.Date}}

# macOS code signing + notarization, cross-platform via quill (no Mac runner
# required). Auto-skipped unless MACOS_SIGN_P12 is set, so local/snapshot builds
# and forks without the secrets are unaffected. Runs after build and before
# archive, so the signed+notarized binary is what gets tarred, checksummed,
# SBOM'd, and cosign-signed.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - repokeeper
      sign:
        # base64-encoded Developer ID Application .p12 (certificate + private key)
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        # App Store Connect API key (issuer UUID, key ID, base64-encoded .p8)
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - THIRD_PARTY_NOTICES.md
      - third_party_licenses/**

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes

changelog:
  disable: true

release:
  draft: false
  make_latest: true
  footer: |
    See [CHANGELOG.md](https://github.com/skaphos/repokeeper/blob/{{ .Tag }}/CHANGELOG.md) for the full release notes.

homebrew_casks:
  - repository:
      owner: skaphos
      name: homebrew-tools
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/skaphos/repokeeper"
    description: "Track and manage many Git repositories from a single config"
    license: "MIT"
    binaries:
      - repokeeper
    custom_block: |
      postflight do
        if OS.mac?
          system_command "/usr/bin/xattr",
                         args: ["-dr", "com.apple.quarantine", "#{staged_path}/repokeeper"]
        end
      end

snapshot:
  version_template: "{{ .Tag }}-next"
