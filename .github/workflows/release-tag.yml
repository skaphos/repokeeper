name: Release Tag

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  release-tag:
    name: Push Release Tag
    if: github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'release-pr')
    runs-on: ubuntu-latest
    steps:
      - name: Mint release bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - uses: skaphos/actions/release-tag@v1.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
